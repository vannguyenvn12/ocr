services:
  ocr-cron:
    build: .
    image: ocr-cron:latest
    container_name: ocr-cron
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ocr-temp:/app/temp
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  ocr-temp:
